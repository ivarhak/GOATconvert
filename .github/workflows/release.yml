name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backends
        run: |
          brew install ffmpeg pandoc create-dmg
          brew install --cask libreoffice

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Build .app and .dmg
        run: |
          chmod +x build_app.sh
          ./build_app.sh

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: GOATconvert-macos
          path: dist/GOATconvert.dmg

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/GOATconvert.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Install ffmpeg
        id: ffmpeg
        uses: FedericoCarboni/setup-ffmpeg@v3

      - name: Install LibreOffice and Inno Setup
        shell: pwsh
        run: |
          choco install libreoffice-fresh -y --no-progress
          choco install innosetup -y --no-progress

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}"
          if ($ver.StartsWith("v")) { $ver = $ver.Substring(1) }
          if (-not ($ver -match '^\d+\.\d+\.\d+')) { $ver = "0.0.0-dev" }
          echo "version=$ver" >> $env:GITHUB_OUTPUT

      - name: Build app
        shell: pwsh
        run: |
          $pandocPath = (Get-Command pandoc).Source
          .\build_app.ps1 -FfmpegPath "${{ steps.ffmpeg.outputs.ffmpeg-path }}" -PandocPath $pandocPath

      - name: Build installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=${{ steps.version.outputs.version }} installer.iss

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: GOATconvert-windows
          path: installer_output/GOATconvert-Setup.exe

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: installer_output/GOATconvert-Setup.exe
